    />
  </head>
  <body class="bg-background">
    <div id="root"></div>
    <script>
      // Password recovery guard (runs BEFORE any module loads).
      //
      // Deux cas à intercepter avant que le SDK Supabase ne parse l'URL :
      //
      //   1. Token valide   → #access_token=...&type=recovery&...
      //      Le SDK consommerait le hash, créerait une session "normale" et
      //      l'utilisateur se retrouverait au Dashboard sans pouvoir changer
      //      son mot de passe.
      //
      //   2. Lien déjà utilisé / expiré → #error=access_denied&error_code=otp_expired
      //      Sans session valide, ProtectedRoute renvoie l'utilisateur sur
      //      /signin sans lui expliquer ce qui s'est passé.
      //
      // Dans les deux cas on force /reset-password, qui affiche soit le
      // formulaire, soit un message "Lien invalide ou expiré" clair.
      (function () {
        try {
          var h = window.location.hash || '';
          var p = window.location.pathname || '/';
          var isRecoveryToken = h.indexOf('type=recovery') !== -1;
          var isRecoveryError =
            h.indexOf('error') !== -1 &&
            (h.indexOf('otp_expired') !== -1 ||
              h.indexOf('access_denied') !== -1);
          if ((isRecoveryToken || isRecoveryError) && p !== '/reset-password') {
            window.location.replace('/reset-password' + window.location.search + h);
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
