# Configuration Supabase CLI pour Parenty
# Doc : https://supabase.com/docs/guides/cli/config
# project_id = identifiant local du projet (sans rapport avec l'URL distante)

project_id = "parenty"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/**"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Passe à true en prod pour exiger la confirmation d'email
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# Fonctions Edge — toutes vérifient le JWT de l'utilisateur
[functions.invite-parent]
verify_jwt = true

[functions.accept-invite]
verify_jwt = true
